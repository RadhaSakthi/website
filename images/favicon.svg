<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="50%" style="stop-color:#00897b"/>
      <stop offset="100%" style="stop-color:#ffc107"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897b"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
  </defs>
  <!-- Outer feather shape -->
  <ellipse cx="32" cy="24" rx="20" ry="24" fill="url(#featherGrad)" opacity="0.9"/>
  <!-- Middle ring -->
  <ellipse cx="32" cy="22" rx="12" ry="14" fill="#1a237e"/>
  <!-- Inner eye -->
  <ellipse cx="32" cy="20" rx="6" ry="8" fill="#00897b"/>
  <!-- Center gold dot -->
  <ellipse cx="32" cy="18" rx="3" ry="4" fill="#ffc107"/>
  <!-- Stem -->
  <path d="M32 48 Q32 56 32 62" stroke="url(#stemGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Feather barbs -->
  <path d="M12 24 Q22 26 28 36" stroke="url(#featherGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M52 24 Q42 26 36 36" stroke="url(#featherGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
